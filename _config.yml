# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Theme configuration
remote_theme: "L-E-A-P/so-leap-theme"
skin: "/assets/css/skins/dark.css"

# Site identity
locale: it-IT
title: "ST"
description: "Strumenti d'invenzione del lavoro tetraedrico"
baseurl: "/st"
url: "https://www.leaphz.net"
date_format: "%B %-d, %Y"
read_time: true
words_per_minute: 200

# MathJax configuration
mathjax:
  enable: true
  combo: "tex-svg"
  tags: "ams"

# Analytics & Comments
google_analytics: G-QZM89XVDCT
# giscus comments are configured in _includes/disqus-comments.html
# (filename kept for theme compatibility — see issue on so-leap-theme to rename
# the include to comments.html across all leap satellite sites)

# Liquid
liquid:
  error_mode: strict

# Build settings
permalink: /:categories/:title/
markdown: kramdown
kramdown:
  math_engine: mathjax

# Feed
feed:
  path: atom.xml

# Search
search_full_content: false

# Taxonomy pages
category_archive_path: "/categories/#"
tag_archive_path: "/tags/#"

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-paginate
  - jekyll-target-blank

# Exclude from processing
exclude:
  - _grezzo
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE

# Collections — one per invention-tool project
collections:
  stone:
    output: true
    permalink: /:collection/:name/
  stoned:
    output: true
    permalink: /:collection/:name/
  tetrarec:
    output: true
    permalink: /:collection/:name/

# Front Matter Defaults
defaults:
  - scope:
      path: ""
    values:
      author: Giuseppe Silvi

  - scope:
      path: "_stone/web"
      type: stone
    values:
      layout: project
      comments: true
      share: true

  - scope:
      path: "_stoned/web"
      type: stoned
    values:
      layout: project
      comments: true
      share: true

  - scope:
      path: "_tetrarec/web"
      type: tetrarec
    values:
      layout: project
      comments: true
      share: true

# Site Author
author:
  name: Giuseppe Silvi
  email: grammaton@me.com
  picture: /images/gs.jpg

# Footer Links
footer_links:
  - title: Feed
    url: atom.xml
    icon: fas fa-rss-square
  - title: GitHub
    url: https://github.com/l-e-a-p/st
    icon: fab fa-github-square
